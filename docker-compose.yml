# ============================================
# Docker Compose — Full development stack
# ============================================
version: "3.9"

services:
  # ---------- Application ----------
  app:
    build: .
    container_name: javaalmas20-app
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/javaalmas20
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: c2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1qYXZhYWxtYXMyMC1hcHBsaWNhdGlvbi0yMDI0
      JWT_EXPIRATION_MS: 3600000
      JWT_REFRESH_EXPIRATION_MS: 86400000
      JPA_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - javaalmas20-net
    restart: unless-stopped

  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:16-alpine
    container_name: javaalmas20-postgres
    environment:
      POSTGRES_DB: javaalmas20
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - javaalmas20-net

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: javaalmas20-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - javaalmas20-net

  # ---------- Zookeeper ----------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: javaalmas20-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - javaalmas20-net

  # ---------- Kafka ----------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: javaalmas20-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - javaalmas20-net

volumes:
  postgres-data:

networks:
  javaalmas20-net:
    driver: bridge
