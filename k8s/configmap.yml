apiVersion: v1
kind: ConfigMap
metadata:
  name: javaalmas20-config
  namespace: javaalmas20
data:
  DATABASE_URL: jdbc:postgresql://postgres-service:5432/javaalmas20
  DATABASE_USERNAME: postgres
  REDIS_HOST: redis-service
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP_SERVERS: kafka-service:9092
  JWT_EXPIRATION_MS: "3600000"
  JWT_REFRESH_EXPIRATION_MS: "86400000"
  JPA_DDL_AUTO: update
  SERVER_PORT: "8080"
