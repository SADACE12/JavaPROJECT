# =============================================
#  DEV profile — runs without Docker
#  H2 in-memory DB, no Redis, no Kafka
# =============================================

# ---------- H2 Database ----------
spring.datasource.url=jdbc:h2:mem:javaalmas20;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------- JPA ----------
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# ---------- JWT ----------
app.jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci1qYXZhYWxtYXMyMC11bml0LXRlc3RzLWhlcmUhIQ==
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=86400000

# ---------- Disable Redis & Kafka ----------
spring.autoconfigure.exclude[0]=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
spring.autoconfigure.exclude[1]=org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
spring.autoconfigure.exclude[2]=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# ---------- Server ----------
server.port=8080

# ---------- Actuator ----------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ---------- OpenAPI ----------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ---------- Logging ----------
logging.level.org.example.javaalmas20=DEBUG
logging.level.org.springframework.security=DEBUG
