# =============================================
#  JavaAlmas20 — Application Configuration
# =============================================

spring.profiles.active=dev

# ---------- Server ----------
server.port=${SERVER_PORT:8080}

# ---------- PostgreSQL ----------
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/javaalmas20}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---------- JPA / Hibernate ----------
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ---------- Redis ----------
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ---------- Kafka ----------
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=javaalmas20-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# ---------- JWT ----------
app.jwt.secret=${JWT_SECRET:c2VjdXJlLWp3dC1zZWNyZXQta2V5LWZvci1qYXZhYWxtYXMyMC1hcHBsaWNhdGlvbi0yMDI0}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:86400000}

# ---------- Actuator ----------
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized

# ---------- OpenAPI ----------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ---------- Logging ----------
logging.level.org.example.javaalmas20=INFO
logging.level.org.springframework.security=WARN