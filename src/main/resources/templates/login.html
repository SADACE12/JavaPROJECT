<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quiz Pro — Вход</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container center-flex">
        <h1 class="title" style="font-size: 2.5rem;">ВХОД ДЛЯ ПРЕПОДАВАТЕЛЯ</h1>
        <p class="error-msg" id="errorMsg"></p>
        
        <form id="loginForm" class="form-group">
            <label>Логин</label>
            <input type="text" id="username" class="form-control" required>
            
            <label style="margin-top: 1rem;">Пароль</label>
            <input type="password" id="password" class="form-control" required>
            
            <button type="submit" class="btn btn-primary" style="margin-top: 2rem;">ВОЙТИ</button>
        </form>
        
        <a href="/register" style="color: var(--accent-color); text-decoration: none;">Нет аккаунта? Зарегистрироваться</a>
        <a href="/" style="color: var(--secondary-text); text-decoration: none; margin-top: 1rem;">← Назад</a>
    </div>

    <script th:src="@{/js/api.js}"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                if(response.ok) {
                    const data = await response.json();
                    setToken(data.accessToken);
                    window.location.href = '/teacher/dashboard';
                } else {
                    document.getElementById('errorMsg').innerText = 'Неверный логин или пароль';
                    document.getElementById('errorMsg').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('errorMsg').innerText = 'Ошибка соединения с сервером';
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
