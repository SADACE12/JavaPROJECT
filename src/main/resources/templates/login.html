<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Pro — Вход</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="center-flex">
        <div class="auth-card">
            <div class="auth-icon">🔑</div>
            <h1 class="auth-title">Вход</h1>
            <p class="auth-subtitle">Войдите в панель преподавателя</p>

            <p class="error-msg" id="errorMsg"></p>

            <form id="loginForm" class="form-group">
                <label for="username">Логин</label>
                <input type="text" id="username" class="form-control" placeholder="Введите логин..." required>

                <label for="password">Пароль</label>
                <input type="password" id="password" class="form-control" placeholder="Введите пароль..." required>

                <button type="submit" class="btn btn-primary" id="loginBtn">ВОЙТИ</button>
            </form>

            <a href="/register" class="auth-link">Нет аккаунта? Зарегистрироваться →</a>
            <br>
            <a href="/" class="auth-back-link">← Назад на главную</a>
        </div>
    </div>

    <script th:src="@{/js/api.js}"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> ВХОД...';
            errorMsg.style.display = 'none';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                if(response.ok) {
                    const data = await response.json();
                    setToken(data.accessToken);
                    window.location.href = '/teacher/dashboard';
                } else {
                    const errData = await response.json().catch(() => null);
                    errorMsg.innerText = errData?.message || 'Неверный логин или пароль';
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'ВОЙТИ';
                }
            } catch (err) {
                errorMsg.innerText = 'Ошибка соединения с сервером';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'ВОЙТИ';
            }
        });
    </script>
</body>
</html>
