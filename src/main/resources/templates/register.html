<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quiz Pro — Регистрация</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container center-flex">
        <h1 class="title" style="font-size: 2.5rem;">РЕГИСТРАЦИЯ ПРЕПОДАВАТЕЛЯ</h1>
        <p class="error-msg" id="errorMsg"></p>
        
        <form id="regForm" class="form-group">
            <label>Логин</label>
            <input type="text" id="username" class="form-control" required>
            
            <label style="margin-top: 1rem;">Email</label>
            <input type="email" id="email" class="form-control" required>
            
            <label style="margin-top: 1rem;">Имя</label>
            <input type="text" id="firstName" class="form-control" required>
            
            <label style="margin-top: 1rem;">Фамилия</label>
            <input type="text" id="lastName" class="form-control" required>
            
            <label style="margin-top: 1rem;">Пароль</label>
            <input type="password" id="password" class="form-control" required>
            
            <button type="submit" class="btn btn-primary" style="margin-top: 2rem;">ЗАРЕГИСТРИРОВАТЬСЯ</button>
        </form>
        
        <a href="/login" style="color: var(--accent-color); text-decoration: none;">Уже есть аккаунт? Войти</a>
    </div>

    <script th:src="@{/js/api.js}"></script>
    <script>
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const body = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                password: document.getElementById('password').value
            };
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });
                if(response.ok) {
                    window.location.href = '/login';
                } else {
                    document.getElementById('errorMsg').innerText = 'Ошибка регистрации';
                    document.getElementById('errorMsg').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('errorMsg').innerText = 'Ошибка соединения';
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
