<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Pro — Регистрация</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="center-flex">
        <div class="auth-card">
            <div class="auth-icon">📝</div>
            <h1 class="auth-title">Регистрация</h1>
            <p class="auth-subtitle">Создайте аккаунт преподавателя</p>

            <p class="error-msg" id="errorMsg"></p>

            <form id="regForm" class="form-group">
                <label for="username">Логин</label>
                <input type="text" id="username" class="form-control" placeholder="Минимум 3 символа" required>

                <label for="email">Email</label>
                <input type="email" id="email" class="form-control" placeholder="example@mail.com" required>

                <label for="firstName">Имя</label>
                <input type="text" id="firstName" class="form-control" placeholder="Ваше имя" required>

                <label for="lastName">Фамилия</label>
                <input type="text" id="lastName" class="form-control" placeholder="Ваша фамилия" required>

                <label for="password">Пароль</label>
                <input type="password" id="password" class="form-control" placeholder="Минимум 8 символов" required>

                <button type="submit" class="btn btn-primary" id="regBtn">ЗАРЕГИСТРИРОВАТЬСЯ</button>
            </form>

            <a href="/login" class="auth-link">Уже есть аккаунт? Войти →</a>
        </div>
    </div>

    <script th:src="@{/js/api.js}"></script>
    <script>
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const body = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                password: document.getElementById('password').value
            };
            const btn = document.getElementById('regBtn');
            const errorMsg = document.getElementById('errorMsg');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> РЕГИСТРАЦИЯ...';
            errorMsg.style.display = 'none';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });
                if(response.ok) {
                    window.location.href = '/login';
                } else {
                    const errData = await response.json().catch(() => null);
                    errorMsg.innerText = errData?.message || 'Ошибка регистрации. Проверьте данные.';
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'ЗАРЕГИСТРИРОВАТЬСЯ';
                }
            } catch (err) {
                errorMsg.innerText = 'Ошибка соединения с сервером';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'ЗАРЕГИСТРИРОВАТЬСЯ';
            }
        });
    </script>
</body>
</html>
