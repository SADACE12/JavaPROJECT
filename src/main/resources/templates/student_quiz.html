<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Pro — Тест</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container quiz-container">
        <h2 class="quiz-progress" id="progressLabel">Загрузка...</h2>
        <h1 class="quiz-question" id="questionText"></h1>

        <div class="options-container" id="optionsContainer"></div>

        <button id="nextBtn" class="btn btn-primary" style="display: none; margin: 0 auto;" onclick="submitAnswer()">ПОДТВЕРДИТЬ ОТВЕТ</button>
    </div>

    <script th:src="@{/js/api.js}"></script>
    <script>
        let questions = [];
        let currentIdx = 0;
        let answers = [];
        let selectedIndex = -1;

        const studentName = sessionStorage.getItem('studentName');
        const roomCode = sessionStorage.getItem('roomCode');

        if (!studentName || !roomCode) {
            window.location.href = '/student/join';
        }

        async function loadQuestions() {
            try {
                const res = await fetch('/api/questions/public');
                if(!res.ok) throw new Error("Failed to load");
                questions = await res.json();

                if(questions.length === 0) {
                    document.getElementById('progressLabel').innerText = 'Нет доступных вопросов';
                    return;
                }
                showQuestion();
            } catch(e) {
                document.getElementById('progressLabel').innerText = 'Ошибка загрузки вопросов';
            }
        }

        function showQuestion() {
            if(currentIdx >= questions.length) {
                finishQuiz();
                return;
            }

            const q = questions[currentIdx];
            document.getElementById('progressLabel').innerText = `Вопрос ${currentIdx + 1} из ${questions.length}`;
            document.getElementById('questionText').innerText = q.questionText;

            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';

            const opts = q.options;
            selectedIndex = -1;
            document.getElementById('nextBtn').style.display = 'none';

            opts.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => selectOption(idx, btn);
                container.appendChild(btn);
            });

            // Re-animate
            container.style.animation = 'none';
            container.offsetHeight;
            container.style.animation = 'slideUp 0.3s ease-out';
        }

        function selectOption(idx, btnElem) {
            selectedIndex = idx;
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btnElem.classList.add('selected');
            document.getElementById('nextBtn').style.display = 'inline-flex';
        }

        function submitAnswer() {
            if(selectedIndex === -1) return;
            answers.push(selectedIndex);
            currentIdx++;
            showQuestion();
        }

        async function finishQuiz() {
            document.getElementById('progressLabel').innerHTML = '<span class="spinner"></span> Отправка результатов...';
            document.getElementById('questionText').innerText = '';
            document.getElementById('optionsContainer').innerHTML = '';
            document.getElementById('nextBtn').style.display = 'none';

            try {
                const res = await fetch('/api/quiz/submit', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ studentName, roomCode, answers })
                });

                if(res.ok) {
                    const resultData = await res.json();
                    sessionStorage.setItem('quizResult', JSON.stringify(resultData));
                    window.location.href = '/student/result';
                } else {
                    document.getElementById('progressLabel').innerText = 'Ошибка при отправке (возможно комната закрыта)';
                }
            } catch(e) {
                document.getElementById('progressLabel').innerText = 'Ошибка сети';
            }
        }

        loadQuestions();
    </script>
</body>
</html>
