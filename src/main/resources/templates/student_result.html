<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Pro — Результат</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="center-flex">
        <h1 class="title" style="font-size: 2.5rem;">ТЕСТ ЗАВЕРШЕН! 🎉</h1>

        <div class="result-card">
            <p class="result-name" id="studentNameDisplay"></p>
            <div class="result-grade" id="gradeDisplay">A</div>
            <p class="result-score" id="scoreDisplay">Счет: 10/10 (100%)</p>
        </div>

        <a href="/" class="btn btn-primary" style="margin-top: 1.5rem;">НА ГЛАВНУЮ</a>
    </div>

    <script>
        const resStr = sessionStorage.getItem('quizResult');
        if(!resStr) {
            window.location.href = '/';
        } else {
            const data = JSON.parse(resStr);
            document.getElementById('studentNameDisplay').innerText = data.studentName;
            document.getElementById('gradeDisplay').innerText = data.grade;
            document.getElementById('scoreDisplay').innerText = `Счет: ${data.score}/${data.total} (${data.percentage.toFixed(1)}%)`;

            const gradeColor = {
                'A': '#22c55e', 'B': '#3b82f6', 'C': '#f59e0b', 'D': '#f97316', 'F': '#ef4444'
            }[data.grade] || 'var(--accent-color)';
            document.getElementById('gradeDisplay').style.color = gradeColor;
        }
    </script>
</body>
</html>
