<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quiz Pro — Результат</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container center-flex">
        <h1 class="title" style="font-size: 3.5rem;">ТЕСТ ЗАВЕРШЕН!</h1>
        
        <div class="card" style="width: 100%; max-width: 500px; text-align: center; margin-top: 2rem;">
            <h2 id="studentNameDisplay" style="color: var(--secondary-text); margin-bottom: 1rem;"></h2>
            <div style="font-size: 5rem; font-weight: bold; color: var(--accent-color); margin: 1rem 0;" id="gradeDisplay">A</div>
            <p style="font-size: 1.5rem;" id="scoreDisplay">Счет: 10/10 (100%)</p>
        </div>
        
        <a href="/" class="btn btn-primary" style="margin-top: 2rem;">НА ГЛАВНУЮ</a>
    </div>

    <script>
        const resStr = sessionStorage.getItem('quizResult');
        if(!resStr) {
            window.location.href = '/';
        } else {
            const data = JSON.parse(resStr);
            document.getElementById('studentNameDisplay').innerText = data.studentName;
            document.getElementById('gradeDisplay').innerText = data.grade;
            document.getElementById('scoreDisplay').innerText = `Счет: ${data.score}/${data.totalQuestions} (${data.percentage.toFixed(1)}%)`;
            
            // Set color based on grade
            const gradeColor = {
                'A': '#28a745', 'B': '#17a2b8', 'C': '#ffc107', 'D': '#fd7e14', 'F': '#dc3545'
            }[data.grade] || 'var(--accent-color)';
            document.getElementById('gradeDisplay').style.color = gradeColor;
        }
    </script>
</body>
</html>
