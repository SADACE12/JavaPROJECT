<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Pro — Панель преподавателя</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <div class="dashboard-header">
            <h1 class="title" style="font-size: 1.8rem;">📋 Панель преподавателя</h1>
            <button onclick="logout()" class="btn btn-secondary">ВЫХОД</button>
        </div>

        <div class="dashboard-grid">
            <!-- Questions Section -->
            <div class="card">
                <h2>📝 Управление вопросами</h2>
                <button onclick="toggleQForm()" class="btn btn-blue" style="width: auto; max-width: none; margin: 1rem 0; padding: 0.6rem 1.2rem; font-size: 0.8rem;">+ ДОБАВИТЬ ВОПРОС</button>

                <form id="qForm" class="form-group" style="display: none; max-width: 100%; padding-bottom: 1.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--card-border);">
                    <label for="qText">Текст вопроса</label>
                    <input type="text" id="qText" class="form-control" placeholder="Введите вопрос..." required>

                    <label for="opt1">Вариант 1 (по умолчанию правильный)</label>
                    <input type="text" id="opt1" class="form-control" placeholder="Вариант 1" required>

                    <label for="opt2">Вариант 2</label>
                    <input type="text" id="opt2" class="form-control" placeholder="Вариант 2" required>

                    <label for="opt3">Вариант 3</label>
                    <input type="text" id="opt3" class="form-control" placeholder="Вариант 3" required>

                    <label for="opt4">Вариант 4</label>
                    <input type="text" id="opt4" class="form-control" placeholder="Вариант 4" required>

                    <label for="correctIdx">Правильный вариант (0–3)</label>
                    <input type="number" id="correctIdx" class="form-control" min="0" max="3" value="0" required>

                    <button type="submit" class="btn btn-primary" style="max-width: 100%;">СОХРАНИТЬ</button>
                </form>

                <div id="qList"><p class="empty-state">Загрузка вопросов...</p></div>
            </div>

            <!-- Rooms Section -->
            <div class="card">
                <h2>🏠 Активные комнаты</h2>

                <div class="inline-form">
                    <input type="text" id="newRoomName" class="form-control" placeholder="Название комнаты">
                    <button onclick="createRoom()" class="btn btn-primary">СОЗДАТЬ</button>
                </div>

                <div id="roomList"><p class="empty-state">Загрузка комнат...</p></div>

                <hr class="section-divider">

                <h2>📊 Результаты по комнате</h2>

                <div class="inline-form">
                    <input type="text" id="checkRoomCode" class="form-control" placeholder="Код комнаты (AB12CD)" style="text-transform: uppercase;">
                    <button onclick="loadResults()" class="btn btn-blue">ПОКАЗАТЬ</button>
                </div>

                <div id="resultsList"></div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/api.js}"></script>
    <script>
        // Auth check
        if(!getToken()) window.location.href = '/login';

        async function loadData() {
            await loadQuestions();
            await loadRooms();
        }

        // --- Questions ---
        function toggleQForm() {
            const f = document.getElementById('qForm');
            f.style.display = f.style.display === 'none' ? 'block' : 'none';
        }

        document.getElementById('qForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const body = {
                questionText: document.getElementById('qText').value,
                opt1: document.getElementById('opt1').value,
                opt2: document.getElementById('opt2').value,
                opt3: document.getElementById('opt3').value,
                opt4: document.getElementById('opt4').value,
                correctIndex: parseInt(document.getElementById('correctIdx').value)
            };
            await apiCall('/questions', 'POST', body);
            document.getElementById('qForm').reset();
            toggleQForm();
            loadQuestions();
        });

        async function loadQuestions() {
            const list = document.getElementById('qList');
            list.innerHTML = '<p class="empty-state">Загрузка...</p>';
            try {
                const qs = await apiCall('/questions');
                list.innerHTML = '';
                if(qs.length === 0) {
                    list.innerHTML = '<p class="empty-state">Нет вопросов. Добавьте первый!</p>';
                    return;
                }
                qs.forEach(q => {
                    list.innerHTML += `<div class="list-item">
                        <span>${q.questionText}</span>
                        <button class="badge-close" onclick="deleteQuestion('${q.id}')">✕</button>
                    </div>`;
                });
            } catch(e) {}
        }

        async function deleteQuestion(id) {
            if(confirm('Удалить вопрос?')) {
                await apiCall(`/questions/${id}`, 'DELETE');
                loadQuestions();
            }
        }

        // --- Rooms ---
        async function loadRooms() {
            const list = document.getElementById('roomList');
            try {
                const rooms = await apiCall('/rooms/my');
                list.innerHTML = '';
                if(rooms.length === 0) {
                    list.innerHTML = '<p class="empty-state">Нет активных комнат</p>';
                    return;
                }
                rooms.forEach(r => {
                    list.innerHTML += `<div class="list-item">
                        <div>
                            <span class="badge" style="margin-right: 0.6rem; font-family: monospace;">${r.code}</span>
                            ${r.name}
                        </div>
                        <button class="badge-close" onclick="closeRoom('${r.code}')">Закрыть</button>
                    </div>`;
                });
            } catch(e) {}
        }

        async function createRoom() {
            const name = document.getElementById('newRoomName').value;
            if(!name) return alert('Введите название');
            await apiCall('/rooms', 'POST', { name });
            document.getElementById('newRoomName').value = '';
            loadRooms();
        }

        async function closeRoom(code) {
            if(confirm('Закрыть комнату? Студенты больше не смогут в нее войти.')) {
                await apiCall(`/rooms/${code}/close`, 'POST');
                loadRooms();
            }
        }

        // --- Results ---
        async function loadResults() {
            const code = document.getElementById('checkRoomCode').value.toUpperCase();
            if(!code) return;
            const list = document.getElementById('resultsList');
            list.innerHTML = '<p class="empty-state">Загрузка...</p>';
            try {
                const res = await apiCall(`/quiz/results/room/${code}`);
                list.innerHTML = '';
                if(res.length === 0) {
                    list.innerHTML = '<p class="empty-state">Нет результатов</p>';
                    return;
                }
                res.forEach(r => {
                    const gradeColor = {
                        'A': '#22c55e', 'B': '#3b82f6', 'C': '#f59e0b', 'D': '#f97316', 'F': '#ef4444'
                    }[r.grade] || 'var(--accent-color)';
                    list.innerHTML += `<div class="list-item">
                        <span><b>${r.studentName}</b></span>
                        <span style="color: ${gradeColor}; font-weight: 700;">${r.grade} (${r.percentage}%)</span>
                    </div>`;
                });
            } catch(e) {
                list.innerHTML = '<p class="empty-state" style="color: var(--danger-color);">Ошибка загрузки</p>';
            }
        }

        loadData();
    </script>
</body>
</html>
