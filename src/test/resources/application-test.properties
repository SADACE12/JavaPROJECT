# =============================================
#  Test profile configuration
# =============================================

# H2 in-memory database for unit tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JWT test config
app.jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci1qYXZhYWxtYXMyMC11bml0LXRlc3RzLWhlcmUhIQ==
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=86400000

# Disable Redis for unit tests
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

# Disable Kafka for unit tests
spring.kafka.bootstrap-servers=localhost:9092
spring.autoconfigure.exclude[0]=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
spring.autoconfigure.exclude[1]=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Logging
logging.level.org.example.javaalmas20=DEBUG
